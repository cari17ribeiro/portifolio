        // ==========================================
        // COMPONENTE: ACOMPANHAMENTO OPERACIONAL
        // ==========================================
        function DashboardOperacional() {
            const [linhas, setLinhas] = useState([]);
            const [motoristasPool, setMotoristasPool] = useState([]);
            const [cavalosPool, setCavalosPool] = useState([]);
            const [carretasPool, setCarretasPool] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                setTimeout(() => {
                    const checksSimulados = { "ABC1234": { status: "APROVADO", km: "105.230" }, "PAR5E55": { status: "REPROVADO", km: "12.000" } };
                    setLinhas([
                        { id: "101", frota: "545", operacao: "TRA", cavalo: { id: "c1", placa: "ABC1234", frotaPadrao: "545", checklist: checksSimulados["ABC1234"] }, motorista: { id: "m1", nome: "MARCOS SOUZA", frotaPadrao: "545" }, carreta: { id: "cr1", placa: "BUG9999", frotaPadrao: "545" }, obs: "" },
                        { id: "102", frota: "546", operacao: "OFICINA", cavalo: { id: "c2", placa: "PAR5E55", frotaPadrao: "546", checklist: checksSimulados["PAR5E55"] }, motorista: null, carreta: null, obs: "Manutenção" }
                    ]);
                    setMotoristasPool([
                        { id: "m3", nome: "RODRIGO LIMA", frotaPadrao: "FROTA A", status: "AGUARDANDO" },
                        { id: "m4", nome: "SEM FROTA 1", frotaPadrao: "SEM FROTA", status: "AGUARDANDO" }
                    ]);
                    setCavalosPool([ { id: "c6", placa: "SEMCHECK", frotaPadrao: "547" } ]);
                    setCarretasPool([ { id: "cr2", placa: "TRC4444", frotaPadrao: "547" } ]);
                    setLoading(false);
                }, 800);
            }, []);

            const stats = useMemo(() => {
                let tra = 0, oficina = 0, ocioso = 0, outros = 0;
                linhas.forEach(l => { if(l.operacao === 'TRA') tra++; else if(l.operacao === 'OFICINA') oficina++; else if(l.operacao === 'OCIOSO') ocioso++; else outros++; });
                return { tra, oficina, ocioso, outros, total: linhas.length };
            }, [linhas]);

            const handleDragStart = (e, tipo, item, sourceIndex, sourceTipo) => {
                e.dataTransfer.setData('application/json', JSON.stringify({ tipo, item, sourceIndex, sourceTipo }));
            };

            const allowDrop = (e) => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); };
            const handleDragLeave = (e) => { e.currentTarget.classList.remove('drag-over'); };

            const handleDropNaLinha = (e, alvoIndex) => {
                e.preventDefault(); 
                e.currentTarget.classList.remove('drag-over');
                try {
                    const data = JSON.parse(e.dataTransfer.getData('application/json'));
                    const novasLinhas = [...linhas];
                    const targetLinha = novasLinhas[alvoIndex];
                    const { tipo, item, sourceIndex, sourceTipo } = data;
                    
                    if (sourceTipo === 'pool') {
                        let oldItem = targetLinha[tipo];
                        targetLinha[tipo] = item;
                        if(tipo === 'motorista') { 
                            let newPool = motoristasPool.filter(m => m.id !== item.id); 
                            if(oldItem) newPool.push({...oldItem, status: 'AGUARDANDO'}); 
                            setMotoristasPool(newPool);
                        } else if(tipo === 'carreta') { 
                            let newPool = carretasPool.filter(c => c.id !== item.id);
                            if(oldItem) newPool.push({...oldItem, status: 'DISPONIVEL'}); 
                            setCarretasPool(newPool); 
                        }
                    } else if (sourceTipo === 'linha' && sourceIndex !== alvoIndex) {
                        const sourceLinha = novasLinhas[sourceIndex];
                        const oldItemTarget = targetLinha[tipo];
                        targetLinha[tipo] = item;
                        sourceLinha[tipo] = oldItemTarget;
                    }
                    setLinhas(novasLinhas);
                } catch (err) {}
            };

            return (
                <div className="flex flex-col h-full space-y-4 pb-10">
                    <div className="glass-card p-3 rounded-xl flex flex-col md:flex-row justify-between items-start md:items-center gap-3 border border-slate-200 shadow-sm">
                        <div>
                            <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2"><Icon name="calendar-days" className="w-5 h-5 text-blue-600" /> Acompanhamento Operacional</h2>
                        </div>
                        <div className="flex gap-2">
                             <button className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-1.5 rounded-md text-xs font-bold shadow flex items-center gap-2"><Icon name="save" className="w-4 h-4"/>Salvar Turno</button>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-5 gap-2">
                        <div className="bg-blue-50 border border-blue-200 p-2 rounded-xl flex flex-col items-center justify-center"><p className="text-2xl font-black text-blue-700">{stats.tra}</p><p className="text-[10px] font-bold text-blue-600 uppercase">TRA</p></div>
                        <div className="bg-red-50 border border-red-200 p-2 rounded-xl flex flex-col items-center justify-center"><p className="text-2xl font-black text-red-700">{stats.oficina}</p><p className="text-[10px] font-bold text-red-600 uppercase">Oficina</p></div>
                        <div className="bg-amber-50 border border-amber-200 p-2 rounded-xl flex flex-col items-center justify-center"><p className="text-2xl font-black text-amber-700">{stats.ocioso}</p><p className="text-[10px] font-bold text-amber-600 uppercase">Ocioso</p></div>
                        <div className="bg-slate-100 border border-slate-300 p-2 rounded-xl flex flex-col items-center justify-center"><p className="text-2xl font-black text-slate-700">{stats.outros}</p><p className="text-[10px] font-bold text-slate-600 uppercase">Outros</p></div>
                        <div className="bg-slate-800 border border-slate-900 p-2 rounded-xl flex flex-col items-center justify-center shadow-md"><p className="text-2xl font-black text-white">{stats.total}</p><p className="text-[10px] font-bold text-slate-300 uppercase">Total Veículos</p></div>
                    </div>

                    <div className="flex flex-col gap-6">
                        <div className="w-full glass-card rounded-xl border border-slate-200 overflow-hidden shadow-sm bg-white">
                            <div className="overflow-x-auto w-full">
                                <table className="w-full text-left border-collapse text-sm">
                                    <thead className="bg-slate-800 text-white">
                                        <tr className="text-xs uppercase tracking-wider">
                                            <th className="px-2 py-2 text-center">Frota</th>
                                            <th className="px-2 py-2">Operação</th>
                                            <th className="px-2 py-2 text-center min-w-[200px]">Motorista</th>
                                            <th className="px-2 py-2 text-center min-w-[140px]">Cavalo</th>
                                            <th className="px-2 py-2 text-center min-w-[160px]">Carreta</th>
                                            <th className="px-2 py-2 text-center min-w-[120px]">Alertas</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-200">
                                        {loading ? (<tr><td colSpan="6" className="text-center py-12"><Icon name="loader-2" className="animate-spin w-8 h-8 text-blue-600 mx-auto" /></td></tr>) : linhas.map((row, idx) => {
                                            return (
                                                <tr key={row.id} className="hover:bg-blue-50/30 transition-colors">
                                                    <td className="px-2 py-2 font-black text-slate-800 text-center text-sm">{row.frota}</td>
                                                    <td className="px-2 py-2"><span className={`p-1.5 rounded font-bold text-xs border ${row.operacao === 'TRA' ? 'bg-blue-100 text-blue-800' : 'bg-red-100 text-red-800'}`}>{row.operacao}</span></td>
                                                    <td className="px-2 py-2 text-center" onDragOver={allowDrop} onDragLeave={handleDragLeave} onDrop={(e) => handleDropNaLinha(e, idx)}>
                                                        {row.motorista ? (
                                                            <div draggable onDragStart={(e) => handleDragStart(e, 'motorista', row.motorista, idx, 'linha')} className="draggable-item text-xs font-bold p-1.5 rounded border shadow-sm bg-white text-slate-700 hover:border-blue-400">{row.motorista.nome}</div>
                                                        ) : <div className="text-xs p-2 border-2 border-dashed border-blue-200 rounded-lg bg-blue-50/50 text-slate-400">Arraste um Motorista</div>}
                                                    </td>
                                                    <td className="px-2 py-2 text-center">
                                                        {row.cavalo ? (
                                                            <div className="flex flex-col justify-center items-center text-[11px] font-bold p-1.5 rounded border shadow-sm bg-slate-50 text-slate-700">
                                                                <span>{row.cavalo.placa}</span>
                                                                {row.cavalo.checklist ? (
                                                                    <div className={`mt-0.5 px-1.5 py-[2px] leading-none rounded text-[9px] font-black ${row.cavalo.checklist.status === 'REPROVADO' ? 'bg-red-200 text-red-800 border-red-300 animate-pulse' : 'bg-emerald-200 text-emerald-800 border-emerald-300'}`}>KM: {row.cavalo.checklist.km}</div>
                                                                ) : null}
                                                            </div>
                                                        ) : <div className="text-xs p-2 border-2 border-dashed border-slate-200 rounded-lg bg-slate-50 text-slate-400">SEM CM</div>}
                                                    </td>
                                                    <td className="px-2 py-2 text-center" onDragOver={allowDrop} onDragLeave={handleDragLeave} onDrop={(e) => handleDropNaLinha(e, idx)}>
                                                        {row.carreta ? (
                                                            <div draggable onDragStart={(e) => handleDragStart(e, 'carreta', row.carreta, idx, 'linha')} className="draggable-item text-xs font-bold p-1.5 rounded border shadow-sm bg-white text-slate-700 hover:border-blue-400">{row.carreta.placa}</div>
                                                        ) : <div className="text-xs p-2 border-2 border-dashed border-blue-200 rounded-lg bg-blue-50/50 text-slate-400">Arraste um Bug</div>}
                                                    </td>
                                                    <td className="px-2 py-2 border-l bg-slate-50/50 text-center">
                                                         {row.cavalo?.checklist?.status === 'REPROVADO' ? <span className="text-[9px] font-bold px-1.5 py-0.5 rounded uppercase shadow-sm bg-red-600 text-white">⚠️ REPROVADO</span> : <span className="text-emerald-600 font-bold bg-emerald-50 px-2 py-1 border border-emerald-200 rounded"><Icon name="check" className="w-3 h-3 inline mr-1" />OK</span>}
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        {/* BANCO DE RECURSOS - ARRASTAR */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                                <h4 className="text-xs font-black uppercase text-slate-700 mb-4 flex items-center gap-2"><Icon name="users" className="w-4 h-4 text-slate-400" /> Banco de Motoristas</h4>
                                <div className="flex flex-wrap gap-2">
                                    {motoristasPool.map(m => (
                                        <div key={m.id} draggable onDragStart={(e) => handleDragStart(e, 'motorista', m, -1, 'pool')} className="draggable-item text-xs font-bold py-2 px-3 rounded-lg bg-blue-50 border border-blue-200 text-blue-800 shadow-sm hover:scale-105 transition-transform">{m.nome}</div>
                                    ))}
                                    {motoristasPool.length === 0 && <span className="text-xs text-slate-400 italic">Nenhum motorista aguardando.</span>}
                                </div>
                            </div>
                            <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                                <h4 className="text-xs font-black uppercase text-slate-700 mb-4 flex items-center gap-2"><Icon name="link" className="w-4 h-4 text-slate-400" /> Banco de Carretas (Bugs)</h4>
                                <div className="flex flex-wrap gap-2">
                                    {carretasPool.map(c => (
                                        <div key={c.id} draggable onDragStart={(e) => handleDragStart(e, 'carreta', c, -1, 'pool')} className="draggable-item text-xs font-bold py-2 px-3 rounded-lg bg-emerald-50 border border-emerald-200 text-emerald-800 shadow-sm hover:scale-105 transition-transform">{c.placa}</div>
                                    ))}
                                    {carretasPool.length === 0 && <span className="text-xs text-slate-400 italic">Nenhuma carreta aguardando.</span>}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // COMPONENTE: MAPA DA FROTA (LEAFLET)
        // ==========================================
        function FrotaMap({ caminhoes, ativo }) {
            const mapContainerRef = useRef(null);
            const mapRef = useRef(null);
            const markersRef = useRef([]);

            const geoJsonMock = {
                "type": "FeatureCollection",
                "features": [
                    { "type": "Feature", "properties": { "name": "DP WORLD", "color": "#8b5cf6" }, "geometry": { "type": "Polygon", "coordinates": [[[-46.313, -23.909], [-46.311, -23.908], [-46.310, -23.912], [-46.313, -23.909]]] } },
                    { "type": "Feature", "properties": { "name": "BTP", "color": "#ef4444" }, "geometry": { "type": "Polygon", "coordinates": [[[-46.348, -23.926], [-46.345, -23.922], [-46.356, -23.919], [-46.348, -23.926]]] } },
                    { "type": "Feature", "properties": { "name": "SANTOS BRASIL", "color": "#f59e0b" }, "geometry": { "type": "Polygon", "coordinates": [[[-46.294, -23.954], [-46.290, -23.956], [-46.285, -23.962], [-46.294, -23.954]]] } }
                ]
            };

            useEffect(() => {
                if (!mapContainerRef.current) return;
                
                if (!mapRef.current) {
                    mapRef.current = L.map(mapContainerRef.current).setView([-23.93, -46.32], 12); 
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(mapRef.current);

                    L.geoJSON(geoJsonMock, {
                        style: function (feature) { return { color: feature.properties.color || '#3b82f6', weight: 2, fillOpacity: 0.2 }; },
                        onEachFeature: function (feature, layer) {
                            if (feature.properties && feature.properties.name) layer.bindTooltip(`<b>Terminal:</b> ${feature.properties.name}`, { permanent: false, direction: 'center' });
                        }
                    }).addTo(mapRef.current);
                }
            }, []);

            useEffect(() => {
                if (!mapRef.current) return;
                if (ativo) { setTimeout(() => mapRef.current.invalidateSize(), 200); }

                markersRef.current.forEach(m => m.remove());
                markersRef.current = [];

                if (ativo && caminhoes) {
                    caminhoes.forEach(cam => {
                        if (cam.lat && cam.lon) {
                            const lat = parseFloat(cam.lat);
                            const lon = parseFloat(cam.lon);
                            let dotColor = '#f97316'; 
                            if (cam.evento && cam.evento.toLowerCase().includes('entrou')) dotColor = '#10b981'; 

                            const customIcon = L.divIcon({
                                className: 'custom-div-icon',
                                html: `<div style="background-color: ${dotColor}; width: 14px; height: 14px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 4px rgba(0,0,0,0.5);"></div>`,
                                iconSize: [14, 14], iconAnchor: [7, 7]
                            });

                            const marker = L.marker([lat, lon], { icon: customIcon })
                                .bindPopup(`<div class="text-sm"><p class="font-bold text-slate-800 border-b pb-1 mb-1">${cam.placa} <span class="text-xs text-slate-500">(Frota: ${cam.frota})</span></p><p class="text-xs font-semibold">${cam.evento}</p></div>`)
                                .addTo(mapRef.current);
                            markersRef.current.push(marker);
                        }
                    });
                }
            }, [caminhoes, ativo]);

            return (
                <div className={`glass-card rounded-2xl p-4 border border-slate-200 mt-6 transition-all duration-300 ${ativo ? 'block animate-in fade-in slide-in-from-top-4' : 'hidden'}`}>
                    <div className="flex items-center gap-2 mb-4">
                        <Icon name="map-pin" className="w-5 h-5 text-indigo-600" />
                        <h3 className="font-bold text-slate-800">Mapa em Tempo Real (Simulação GeoJSON)</h3>
                    </div>
                    <div ref={mapContainerRef} className="w-full h-[400px] rounded-xl border border-slate-200 shadow-inner z-10 relative"></div>
                </div>
            );
        }

        // ==========================================
        // COMPONENTE: DASHBOARD DE FROTAS E TEMPOS
        // ==========================================
        function DashboardFrota() {
            const [caminhoes, setCaminhoes] = useState([]);
            const [loading, setLoading] = useState(true);
            const [mostrarMapa, setMostrarMapa] = useState(false);

            useEffect(() => {
                setTimeout(() => {
                    setCaminhoes([
                        { placa: "ABC-1234", frota: "545", evento: "Entrou na DP WORLD", ultimaAtualizacao: "15/07/2026 10:15", lat: "-23.9098", lon: "-46.3121", horaEntrada: "15/07/2026 09:00", classificacao: "" },
                        { placa: "GHP-3H55", frota: "546", evento: "Em trânsito", ultimaAtualizacao: "15/07/2026 10:20", lat: "-23.9400", lon: "-46.3300", horaEntrada: "15/07/2026 09:20", classificacao: "" },
                        { placa: "XYZ-9988", frota: "547", evento: "Entrou na BTP", ultimaAtualizacao: "15/07/2026 10:35", lat: "-23.9240", lon: "-46.3500", horaEntrada: "15/07/2026 09:10", classificacao: "" }

            const stats = useMemo(() => {
                let e = 0, n = 0;

                    const ev = c.evento.toLowerCase();
                    if (ev.includes('trânsito')) e++;
                    else if (ev.includes('entrou') || ev.includes('no ')) n++;

            return (
                <div className="max-w-[1600px] mx-auto space-y-6 pb-12">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <h1 className="text-3xl font-bold text-slate-800 flex items-center gap-3"><Icon name="truck" className="w-8 h-8 text-blue-600" /> Gestão de Frota e Trânsito</h1>
                            <p className="text-slate-500 mt-1">Monitoramento em tempo real via Telemetria</p>
                        </div>
                        <div className="flex gap-3 w-full md:w-auto">
                            <button onClick={() => setMostrarMapa(!mostrarMapa)} className={`flex-1 md:flex-none flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-semibold transition-all shadow border ${mostrarMapa ? 'bg-slate-800 text-white border-slate-900' : 'bg-white text-slate-700 hover:bg-slate-50 border-slate-200'}`}>
                                <Icon name={mostrarMapa ? "map-pin-off" : "map"} className="w-5 h-5" />
                                {mostrarMapa ? 'Ocultar Mapa' : 'Visualizar Mapa'}
                            </button>
                        </div>
                    </div>

                    <FrotaMap caminhoes={caminhoes} ativo={mostrarMapa} />

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6">
                        <div className="glass-card rounded-2xl p-5 flex flex-col justify-center border border-white">
                            <div className="flex items-center justify-between"><div><p className="text-xs font-bold text-slate-500 uppercase tracking-wider">Total de Veículos</p><p className="text-3xl font-black text-slate-800 mt-1">{stats.t}</p></div><div className="p-3 bg-blue-50 rounded-full text-blue-600"><Icon name="layout-grid" className="w-6 h-6" /></div></div>
                        </div>
                        <div className="glass-card rounded-2xl p-5 flex flex-col border border-white h-full justify-between">
                            <div className="flex items-start justify-between"><div><p className="text-xs font-bold text-slate-500 uppercase tracking-wider">Nos Terminais</p><p className="text-3xl font-black text-emerald-600 mt-1">{stats.n}</p></div><div className="p-3 bg-emerald-50 rounded-full text-emerald-600"><Icon name="home" className="w-6 h-6" /></div></div>
                        </div>
                        <div className="glass-card rounded-2xl p-5 flex flex-col justify-center border border-white">
                            <div className="flex items-center justify-between"><div><p className="text-xs font-bold text-slate-500 uppercase tracking-wider">Em Trânsito</p><p className="text-3xl font-black text-orange-500 mt-1">{stats.e}</p></div><div className="p-3 bg-orange-50 rounded-full text-orange-500"><Icon name="navigation" className="w-6 h-6" /></div></div>
                        </div>
                    </div>

                    <div className="glass-card rounded-2xl border border-white overflow-hidden flex flex-col mt-6">
                        <div className="p-6 border-b border-slate-100 flex justify-between items-center">
                            <h2 className="text-xl font-bold text-slate-800">Status Atualizado da Frota</h2>
                        </div>
                        <div className="overflow-x-auto bg-white">
                            <table className="w-full text-left border-collapse text-sm">
                                <thead>
                                    <tr className="bg-slate-800 text-white text-xs uppercase tracking-wider">
                                        <th className="px-6 py-3">Placa</th>
                                        <th className="px-6 py-3">Frota</th>
                                        <th className="px-6 py-3">Evento Atual</th>
                                        <th className="px-6 py-3">Última Atual.</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {loading ? (
                                        <tr><td colSpan="4" className="px-6 py-8 text-center text-slate-500"><Icon name="loader-2" className="w-8 h-8 animate-spin mx-auto mb-2" />A Carregar telemetria...</td></tr>
                                    ) : caminhoes.map((cam, idx) => (
                                        <tr key={idx} className="hover:bg-slate-50">
                                            <td className="px-6 py-3 font-bold text-slate-800 text-sm">{cam.placa}</td>
                                            <td className="px-6 py-3 text-slate-600 text-sm">{cam.frota}</td>
                                            <td className="px-6 py-3">
                                                <span className={`px-2.5 py-1 rounded-md text-xs font-bold border ${cam.evento.toLowerCase().includes('entrou') ? 'bg-emerald-100 text-emerald-800 border-emerald-200' : 'bg-orange-100 text-orange-800 border-orange-200'}`}>
                                                    {cam.evento}
                                                </span>
                                            </td>
                                            <td className="px-6 py-3 text-slate-500 text-xs font-medium">{cam.ultimaAtualizacao}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // COMPONENTE: KANBAN NAVIOS 
        // ==========================================
        function KanbanNavios() {
            const [navios, setNavios] = useState([]);
            const [loading, setLoading] = useState(true);
            const [now, setNow] = useState(new Date());

            useEffect(() => { const timer = setInterval(() => setNow(new Date()), 60000); return () => clearInterval(timer); }, []);
            
            useEffect(() => {
                setTimeout(() => {
                    const ontem = new Date(new Date().getTime() - 24*60*60*1000);
                    setNavios([
                        { id: "1", operador: "SANTOS BRASIL", navio: "COSCO MEXICO 0285", janela: "12", previsao: "", atracacao: ontem.toISOString(), gate: "", talho: "", ipa20: 0, ipa40: 22, clia20: 5, clia40: 13, status: "AGUARDANDO GATE TRA" },
                        { id: "2", operador: "DP WORLD", navio: "HYUNDAI DYNASTY", janela: "4", previsao: "", atracacao: ontem.toISOString(), gate: ontem.toISOString(), talho: "", ipa20: 11, ipa40: 5, clia20: 5, clia40: 9, status: "ENTREGANDO" },
                        { id: "3", operador: "BTP", navio: "ESPIRITO SANTO", janela: "6", previsao: new Date().toISOString(), atracacao: "", gate: "", talho: "", ipa20: 20, ipa40: 0, clia20: 85, clia40: 90, status: "AGUARDANDO ATRACAÇÃO" }
                    ]);
                    setLoading(false);
                }, 500);
            }, []);

            const cols = {
                "AGUARDANDO ATRACAÇÃO": navios.filter(n => n.status === "AGUARDANDO ATRACAÇÃO"),
                "AGUARDANDO GATE TRA": navios.filter(n => n.status === "AGUARDANDO GATE TRA"),
                "TALHO ENVIADO": navios.filter(n => n.status === "TALHO ENVIADO"),
                "ENTREGANDO": navios.filter(n => n.status === "ENTREGANDO")
            };

            const totE = useMemo(() => cols["ENTREGANDO"].reduce((a, n) => {
                a.ipa20 += Number(n.ipa20||0); a.ipa40 += Number(n.ipa40||0); a.clia20 += Number(n.clia20||0); a.clia40 += Number(n.clia40||0); return a;
            }, { ipa20: 0, ipa40: 0, clia20: 0, clia40: 0 }), [navios]);

            const tIpa = totE.ipa20 + (totE.ipa40 * 2), tClia = totE.clia20 + (totE.clia40 * 2), tGer = tIpa + tClia;

            return (
                <div className="max-w-[1600px] mx-auto space-y-6 pb-12">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Icon name="ship" className="w-6 h-6 text-indigo-600" /> Operações Portuárias</h2>
                        <button className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2 shadow-sm"><Icon name="plus" className="w-4 h-4" /> Novo Navio</button>
                    </div>

                    <div className="mb-6 bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                        <div className="flex items-center gap-2 mb-4"><Icon name="boxes" className="w-5 h-5 text-indigo-600" /><h3 className="text-sm font-bold text-slate-600 uppercase tracking-wider">Resumo de Volumes (TEUs) Entregando</h3></div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 flex items-center justify-between"><div><p className="text-xs font-bold text-slate-500 uppercase tracking-wider">Total Geral TEUs</p><p className="text-3xl font-black text-slate-800 mt-1">{tGer}</p></div><div className="p-3 bg-slate-200 rounded-full"><Icon name="layers" className="w-6 h-6 text-slate-600" /></div></div>
                            <div className="bg-blue-50 p-4 rounded-xl border border-blue-100 flex items-center justify-between"><div><p className="text-xs font-bold text-blue-600 uppercase">Total IPA (TEUs)</p><p className="text-2xl font-black text-blue-800 mt-1">{tIpa}</p><div className="text-[10px] text-blue-600 mt-1 font-semibold flex gap-2"><span className="bg-blue-100 px-1.5 rounded">20": {totE.ipa20} Cont.</span><span className="bg-blue-100 px-1.5 rounded">40": {totE.ipa40} Cont.</span></div></div><div className="p-3 bg-blue-100 rounded-full"><Icon name="box" className="w-6 h-6 text-blue-600" /></div></div>
                            <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-100 flex items-center justify-between"><div><p className="text-xs font-bold text-emerald-600 uppercase">Total CLIA (TEUs)</p><p className="text-2xl font-black text-emerald-800 mt-1">{tClia}</p><div className="text-[10px] text-emerald-600 mt-1 font-semibold flex gap-2"><span className="bg-emerald-100 px-1.5 rounded">20": {totE.clia20} Cont.</span><span className="bg-emerald-100 px-1.5 rounded">40": {totE.clia40} Cont.</span></div></div><div className="p-3 bg-emerald-100 rounded-full"><Icon name="package" className="w-6 h-6 text-emerald-600" /></div></div>
                        </div>
                    </div>

                    {loading ? (
                        <div className="flex justify-center items-center py-20"><Icon name="loader-2" className="w-8 h-8 animate-spin text-blue-600" /></div>
                    ) : (
                        <div className="flex flex-col xl:flex-row gap-6 items-start">
                            <div className="w-full xl:w-1/4 flex flex-col gap-4">
                                <ColunaKanban titulo="Aguardando Atracação" cor="bg-slate-200" textCor="text-slate-700" navios={cols["AGUARDANDO ATRACAÇÃO"]} now={now} defaultExpanded={false} />
                                <ColunaKanban titulo="Aguardando Gate TRA" cor="bg-amber-200" textCor="text-amber-800" navios={cols["AGUARDANDO GATE TRA"]} now={now} defaultExpanded={false} />
                                <ColunaKanban titulo="Talho Enviado" cor="bg-indigo-200" textCor="text-indigo-800" navios={cols["TALHO ENVIADO"]} now={now} defaultExpanded={false} />
                            </div>
                            <div className="w-full xl:w-3/4">
                                <ColunaKanban titulo="Entregando" cor="bg-emerald-200" textCor="text-emerald-800" navios={cols["ENTREGANDO"]} now={now} defaultExpanded={true} isDestaque={true} />
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function ColunaKanban({ titulo, cor, textCor, navios, now, defaultExpanded = false, isDestaque = false }) {
            const [expanded, setExpanded] = useState(defaultExpanded);
            return (
                <div className={`bg-slate-100 rounded-xl p-4 flex flex-col gap-4 shadow-inner border border-slate-200 transition-all duration-300 ${expanded || isDestaque ? 'kanban-col flex-1' : 'w-full h-fit'}`}>
                    <div onClick={() => !isDestaque && setExpanded(!expanded)} className={`flex items-center justify-between mb-2 ${!isDestaque ? 'cursor-pointer hover:bg-slate-200 p-2 -m-2 rounded-lg' : ''} transition-colors select-none`}>
                        <div className="flex items-center gap-2">{!isDestaque && <Icon name={expanded ? "chevron-down" : "chevron-right"} className={`w-5 h-5 ${textCor}`} />}{isDestaque && <Icon name="activity" className={`w-5 h-5 ${textCor} animate-pulse`} />}<h3 className={`font-bold ${textCor} uppercase ${isDestaque ? 'text-lg' : 'text-sm'} tracking-wider`}>{titulo}</h3></div>
                        <span className={`px-3 py-1 rounded-full ${isDestaque ? 'text-sm' : 'text-xs'} font-black ${cor} ${textCor} shadow-sm`}>{navios.length}</span>
                    </div>
                    {(expanded || isDestaque) && (
                        <div className={`grid gap-4 ${isDestaque ? 'grid-cols-1 md:grid-cols-2 lg:grid-cols-3' : 'grid-cols-1'}`}>
                            {navios.length === 0 && <p className="text-center text-slate-400 text-xs italic py-4 col-span-full">Nenhum navio nesta fase.</p>}
                            {navios.map(n => <CartaoNavio key={n.id} navio={n} now={now} />)}
                        </div>
                    )}
                </div>
            );
        }

        function CartaoNavio({ navio, now }) {
            const fd = (i) => i ? new Date(i).toLocaleString('pt-BR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) : "--";
            
            const iT = Number(navio.ipa20||0) + Number(navio.ipa40||0);
            const cT = Number(navio.clia20||0) + Number(navio.clia40||0);
            
            let pInf = null;
            if (navio.status === "ENTREGANDO" && navio.gate) {
                const lD = new Date(new Date(navio.gate).getTime() + (48*60*60*1000));
                const df = lD - now; const dF = lD.toLocaleString('pt-BR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
                const horasRestantes = df / (1000 * 60 * 60);

                if (horasRestantes <= 0) {
                    pInf = <div className="flex flex-col gap-1 items-start mt-2 pt-2 border-t border-slate-200"><span className="text-red-600 font-bold bg-red-100 px-2 py-1 rounded text-xs animate-pulse">POSTERGADO!</span><span className="text-[10px] text-red-500 font-bold"><Icon name="clock" className="w-3 h-3 inline mr-1" />Limite: {dF}</span></div>;
                } else {
                    let corBg = 'bg-emerald-100', corTexto = 'text-emerald-700', corIcon = 'text-emerald-500';
                    if (horasRestantes <= 4) { corBg = 'bg-red-100'; corTexto = 'text-red-700'; corIcon = 'text-red-500'; } 
                    else if (horasRestantes <= 8) { corBg = 'bg-orange-100'; corTexto = 'text-orange-700'; corIcon = 'text-orange-500'; }
                    const mRestantes = Math.floor((df % (1000 * 60 * 60)) / (1000 * 60));
                    pInf = (
                        <div className="flex flex-col gap-1 items-start mt-2 pt-2 border-t border-slate-200"><span className={`${corTexto} font-bold ${corBg} px-2 py-1 rounded text-xs transition-colors`}>{Math.floor(horasRestantes)}h {mRestantes}m restantes</span><span className={`text-[10px] ${corIcon} font-bold`}><Icon name="clock" className="w-3 h-3 inline mr-1" />Até {dF}</span></div>
                    );
                }
            }

            const operadorUpper = navio.operador.toUpperCase().trim();
            const logoSvg = LOGOS_OPERADORES[operadorUpper];
            
            return (
                <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 cursor-pointer hover:border-blue-400 hover:shadow-md transition-all group flex flex-col justify-between">
                    <div>
                        <div className="flex justify-between items-start mb-2">
                            {logoSvg ? (
                                <div className="bg-slate-50 p-1.5 rounded-md border border-slate-200 flex items-center justify-center min-w-[60px] h-[28px] shadow-sm">{logoSvg}</div>
                            ) : (
                                <span className="text-xs font-bold bg-slate-800 text-white px-2 py-1 rounded shadow-sm uppercase">{navio.operador}</span>
                            )}
                            {navio.janela && <span className="text-[10px] text-slate-500 font-semibold border px-1 rounded bg-slate-50">Janela: {navio.janela}h</span>}
                        </div>
                        <h4 className="font-bold text-slate-800 text-lg leading-tight mb-3 group-hover:text-blue-600 transition-colors">{navio.navio}</h4>
                        <div className="space-y-1.5 text-xs text-slate-600 mb-4 bg-slate-50 p-2 rounded">
                            {navio.status === "AGUARDANDO ATRACAÇÃO" && <p><strong>Prev:</strong> {fd(navio.previsao)}</p>}
                            {navio.status !== "AGUARDANDO ATRACAÇÃO" && <p><strong>Atracação:</strong> {fd(navio.atracacao)}</p>}
                            {(navio.status === "ENTREGANDO" || navio.status === "TALHO ENVIADO") && <p><strong>Gate:</strong> {fd(navio.gate)}</p>}
                            {navio.status === "TALHO ENVIADO" && <p className="text-indigo-600"><strong>Talho:</strong> {fd(navio.talho)}</p>}
                            {pInf}
                        </div>
                    </div>
                    <div className="flex gap-2">
                        <div className="flex-1 bg-blue-50 border border-blue-100 rounded p-1.5 text-center"><p className="text-[10px] font-bold text-blue-600">IPA</p><p className="text-sm font-black text-blue-800">{iT}</p></div>
                        <div className="flex-1 bg-emerald-50 border border-emerald-100 rounded p-1.5 text-center"><p className="text-[10px] font-bold text-emerald-600">CLIA</p><p className="text-sm font-black text-emerald-800">{cT}</p></div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // COMPONENTE: REGISTRO DE OPERAÇÕES
        // ==========================================
        function DashboardControleOperacoes() {
            const [saving, setSaving] = useState(false); 
            const [tipoOp, setTipoOp] = useState('IMPORTACAO');
            const [navios, setNavios] = useState([]);
            const [form, setForm] = useState({ transportadora: '', placa: '', motorista: '', navioId: '', tipoContainer: 'ipa20', quantidade: 1, dataHora: '', obs: '', frota: '', cavalo: '', carreta: '' });

            useEffect(() => {
                setTimeout(() => { 
                    setNavios([ 
                        { id: "1", operador: "SANTOS BRASIL", navio: "COSCO MEXICO 0285", ipa20: 0, ipa40: 22, clia20: 5, clia40: 13, status: "ENTREGANDO" },
                        { id: "2", operador: "DP WORLD", navio: "HYUNDAI DYNASTY", ipa20: 11, ipa40: 5, clia20: 5, clia40: 9, status: "ENTREGANDO" }
                    ]); 
                }, 800);
            }, []);

            const handleChange = (e) => {
                const { name, value } = e.target;
                setForm(p => ({ ...p, [name]: value.toUpperCase() }));
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                setSaving(true);
                setTimeout(() => { 
                    alert("Registado com sucesso! (Modo Demo)"); 
                    setForm({ transportadora: '', placa: '', motorista: '', navioId: '', tipoContainer: 'ipa20', quantidade: 1, dataHora: '', obs: '', frota: '', cavalo: '', carreta: '' }); 
                    setSaving(false); 
                }, 800);
            };

            const navioSelecionado = navios.find(n => n.id === form.navioId);

            return (
                <div className="max-w-[1200px] mx-auto space-y-6 pb-12 w-full">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-2">
                        <div>
                            <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2"><Icon name="clipboard-edit" className="w-6 h-6 text-blue-600" /> Registo de Operações</h2>
                            <p className="text-slate-500 mt-1 text-sm md:text-base">Registe as movimentações para atualização de saldo e histórico.</p>
                        </div>
                    </div>

                    <div className="bg-slate-200 p-1.5 rounded-xl flex flex-col sm:flex-row gap-1 shadow-inner max-w-2xl w-full mb-8">
                        <button onClick={() => setTipoOp('IMPORTACAO')} className={`flex-1 py-2.5 rounded-lg font-bold text-sm flex items-center justify-center gap-2 transition-all ${tipoOp === 'IMPORTACAO' ? 'bg-blue-600 text-white shadow' : 'text-slate-600 hover:bg-slate-300'}`}><Icon name="arrow-down-to-line" className="w-4 h-4" /> Importação</button>
                        <button onClick={() => setTipoOp('EXPORTACAO')} className={`flex-1 py-2.5 rounded-lg font-bold text-sm flex items-center justify-center gap-2 transition-all ${tipoOp === 'EXPORTACAO' ? 'bg-emerald-600 text-white shadow' : 'text-slate-600 hover:bg-slate-300'}`}><Icon name="arrow-up-from-line" className="w-4 h-4" /> Exportação</button>
                    </div>
                    
                    <div className="flex flex-col lg:flex-row gap-6 items-start w-full">
                        {/* FORMULÁRIO */}
                        <div className="w-full lg:w-2/3 glass-card p-4 md:p-6 rounded-2xl border border-white shadow-sm relative overflow-hidden transition-all duration-300">
                            <form onSubmit={handleSubmit} className="space-y-6">
                                <div>
                                    <h3 className="font-bold text-slate-800 flex items-center gap-2 border-b border-slate-200 pb-2 mb-4"><Icon name="calendar-clock" className="w-4 h-4 text-blue-600" /> 1. Data do Agendamento</h3>
                                    <input required type="datetime-local" name="dataHora" value={form.dataHora} onChange={handleChange} className="w-full md:w-1/2 p-2 border rounded focus:ring-2 focus:ring-blue-500 text-sm border-slate-300" />
                                </div>

                                <div>
                                    <h3 className="font-bold text-slate-800 flex items-center gap-2 border-b border-slate-200 pb-2 mb-4"><Icon name="truck" className="w-4 h-4 text-blue-600" /> 2. Vínculo do Transporte</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                        <div><label className="block text-xs font-bold text-slate-600 mb-1">Transportadora</label><input required name="transportadora" value={form.transportadora} onChange={handleChange} className="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 uppercase text-sm" placeholder="Ex: FROTA" /></div>
                                        <div className="md:col-span-2"><label className="block text-xs font-bold text-slate-600 mb-1">Placa do Veículo / CM</label><input required name="placa" value={form.placa} onChange={handleChange} className="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 uppercase text-sm" placeholder="Ex: ABC-1234" /></div>
                                        <div className="md:col-span-3 pt-2"><label className="block text-xs font-bold text-slate-600 mb-1">Motorista</label><input required name="motorista" value={form.motorista} onChange={handleChange} className="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 uppercase text-sm" placeholder="Nome Completo" /></div>
                                    </div>
                                </div>

                                <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                                    <h3 className="font-bold text-slate-800 flex items-center gap-2 border-b border-slate-200 pb-2 mb-4"><Icon name="package" className="w-4 h-4 text-blue-600" /> 3. Retirada & Carga</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="md:col-span-2"><label className="block text-xs font-bold text-slate-600 mb-1">Navio (Status: Entregando)</label><select required name="navioId" value={form.navioId} onChange={handleChange} className="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 font-bold text-sm bg-white"><option value="" disabled>Selecione a origem da carga...</option>{navios.map(n => <option key={n.id} value={n.id}>{n.navio} ({n.operador})</option>)}</select></div>
                                        <div><label className="block text-xs font-bold text-slate-600 mb-1">Tipo de Container</label><select required name="tipoContainer" value={form.tipoContainer} onChange={handleChange} className="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 font-bold text-sm bg-white"><option value="ipa20">IPA 20"</option><option value="ipa40">IPA 40"</option><option value="clia20">CLIA 20"</option><option value="clia40">CLIA 40"</option></select></div>
                                        <div><label className="block text-xs font-bold text-slate-600 mb-1">Quantidade</label><input required type="number" min="1" max="2" name="quantidade" value={form.quantidade} onChange={handleChange} className="w-full p-2 border border-slate-300 rounded focus:ring-2 focus:ring-blue-500 font-bold text-center text-sm" /></div>
                                    </div>
                                </div>
                                <div className="flex justify-end pt-4 border-t border-slate-200 mt-6">
                                    <button type="submit" disabled={saving || !form.navioId} className={`${tipoOp === 'IMPORTACAO' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-emerald-600 hover:bg-emerald-700'} text-white w-full sm:w-auto px-8 py-3 rounded-xl font-bold shadow-md flex items-center justify-center gap-2 transition-colors disabled:opacity-50`}><Icon name="check-circle" className={`w-5 h-5 ${saving ? 'animate-pulse' : ''}`} /> Confirmar e Deduzir</button>
                                </div>
                            </form>
                        </div>

                        {/* CAIXA DE SALDO DO NAVIO */}
                        <div className="w-full lg:w-1/3 flex flex-col gap-6">
                            <div className={`glass-card p-6 rounded-2xl border transition-colors duration-300 ${navioSelecionado ? 'border-emerald-300 bg-emerald-900 text-white shadow-lg' : 'border-slate-200 bg-slate-100'}`}>
                                <h3 className={`font-bold flex items-center gap-2 mb-4 ${navioSelecionado ? 'text-emerald-100' : 'text-slate-500'}`}><Icon name="pie-chart" className="w-5 h-5" /> Saldo Disponível no Navio</h3>
                                {navioSelecionado ? (
                                    <div className="animate-in fade-in slide-in-from-bottom-2">
                                        <p className="text-[10px] uppercase font-bold text-emerald-300 tracking-wider">Operador: {navioSelecionado.operador}</p><h4 className="text-xl font-black mb-4 leading-tight">{navioSelecionado.navio}</h4>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className={`p-3 rounded-lg border transition-all ${form.tipoContainer === 'ipa20' ? 'bg-emerald-800 border-white shadow-inner scale-105' : 'bg-emerald-800/50 border-emerald-700'}`}><p className="text-[9px] uppercase font-bold text-emerald-300">IPA 20"</p><p className="text-2xl font-black">{navioSelecionado.ipa20} <span className="text-[10px] font-normal opacity-70">Cont.</span></p></div>
                                            <div className={`p-3 rounded-lg border transition-all ${form.tipoContainer === 'ipa40' ? 'bg-emerald-800 border-white shadow-inner scale-105' : 'bg-emerald-800/50 border-emerald-700'}`}><p className="text-[9px] uppercase font-bold text-emerald-300">IPA 40"</p><p className="text-2xl font-black">{navioSelecionado.ipa40} <span className="text-[10px] font-normal opacity-70">Cont.</span></p></div>
                                            <div className={`p-3 rounded-lg border transition-all ${form.tipoContainer === 'clia20' ? 'bg-emerald-800 border-white shadow-inner scale-105' : 'bg-emerald-800/50 border-emerald-700'}`}><p className="text-[9px] uppercase font-bold text-emerald-300">CLIA 20"</p><p className="text-2xl font-black">{navioSelecionado.clia20} <span className="text-[10px] font-normal opacity-70">Cont.</span></p></div>
                                            <div className={`p-3 rounded-lg border transition-all ${form.tipoContainer === 'clia40' ? 'bg-emerald-800 border-white shadow-inner scale-105' : 'bg-emerald-800/50 border-emerald-700'}`}><p className="text-[9px] uppercase font-bold text-emerald-300">CLIA 40"</p><p className="text-2xl font-black">{navioSelecionado.clia40} <span className="text-[10px] font-normal opacity-70">Cont.</span></p></div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="text-center py-6 text-slate-400"><Icon name="anchor" className="w-8 h-8 mx-auto mb-2 opacity-50" /><p className="text-sm font-bold">Selecione um navio.</p></div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // COMPONENTE: VISÃO DIÁRIA DE OPERAÇÕES
        // ==========================================
        function DashboardVisaoOperacoes() {
            const [operacoes, setOperacoes] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                setTimeout(() => {
                    setOperacoes([
                        { id: 1, dataHora: "2026-07-15T14:00", tipoOp: "IMPORTACAO", navioOuOp: "MOL EXPERIENCE", veiculo: "CM: ABC1234 | BUG: XYZ9876", motorista: "JOAO SILVA", detalhes: "2x IPA 40", obs: "" },
                        { id: 2, dataHora: "2026-07-15T15:30", tipoOp: "EXPORTACAO", navioOuOp: "ESPIRITO SANTO", veiculo: "CM: GHP3H55 | BUG: TRC4444", motorista: "MARCOS SOUZA", detalhes: "1x CLIA 20", obs: "Atrasado" }
                    ]);
                    setLoading(false);
                }, 800);
            }, []);

            return (
                 <div className="max-w-[1600px] mx-auto space-y-4 relative pb-10">
                    <div className="glass-card p-4 rounded-xl flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div><h2 className="text-xl font-bold text-slate-800 flex items-center gap-2"><Icon name="list-checks" className="w-5 h-5 text-indigo-600" /> Visão Diária de Operações</h2></div>
                    </div>
                    <div className="w-full glass-card rounded-xl border border-slate-200 overflow-hidden shadow-sm bg-white mt-4">
                        <div className="overflow-x-auto w-full">
                            <table className="w-full text-left border-collapse text-sm">
                                <thead className="bg-slate-800 text-white">
                                    <tr className="text-xs uppercase tracking-wider">
                                        <th className="px-4 py-3">Horário</th>
                                        <th className="px-4 py-3">Tipo</th>
                                        <th className="px-4 py-3">Navio / Operação</th>
                                        <th className="px-4 py-3">Veículo</th>
                                        <th className="px-4 py-3">Motorista</th>
                                        <th className="px-4 py-3">Detalhes</th>
                                        <th className="px-4 py-3">Obs</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100 bg-white">
                                    {loading ? (<tr><td colSpan="7" className="text-center py-8"><Icon name="loader-2" className="animate-spin w-8 h-8 text-slate-400 mx-auto" /></td></tr>) : operacoes.map((op) => (
                                        <tr key={op.id} className="hover:bg-slate-50 transition-colors">
                                            <td className="px-4 py-3 font-bold text-slate-600">{new Date(op.dataHora).toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})}</td>
                                            <td className="px-4 py-3"><span className="text-[10px] font-bold px-2 py-1 rounded uppercase tracking-wide bg-blue-100 text-blue-800">{op.tipoOp}</span></td>
                                            <td className="px-4 py-3 font-black text-slate-800">{op.navioOuOp}</td>
                                            <td className="px-4 py-3 text-xs font-medium text-slate-600">{op.veiculo}</td>
                                            <td className="px-4 py-3 text-xs font-bold text-slate-700">{op.motorista}</td>
                                            <td className="px-4 py-3 text-slate-600 text-xs">{op.detalhes}</td>
                                            <td className="px-4 py-3 text-xs text-slate-500 italic">{op.obs || '-'}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            )
        }

        // ==========================================
        // APP ESTRUTURA PRINCIPAL
        // ==========================================
        function App() {
            const [activeTab, setActiveTab] = useState('operacional');

            const navTabClass = (tabName) => `px-3 py-2 rounded-md text-[11px] sm:text-xs font-bold flex items-center gap-1.5 transition-all whitespace-nowrap cursor-pointer ${activeTab === tabName ? 'bg-white text-emerald-800 shadow-md transform scale-105' : 'text-white/80 hover:bg-white/20 hover:text-white'}`;

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    <div className="bg-amber-100 text-amber-800 text-center py-2 text-xs font-bold border-b border-amber-200 px-4">
                        <Icon name="info" className="w-3.5 h-3.5 inline mr-1" />
                        Esta é uma versão ilustrativa e limitada, construída a partir de um projeto Google Apps Script. Dados são fictícios.
                    </div>

                    <nav className="bg-gradient-to-r from-slate-900 via-slate-800 to-emerald-900 text-white shadow-xl sticky top-0 z-40 border-b-4 border-emerald-500">
                        <div className="max-w-[1600px] mx-auto px-4 w-full">
                            <div className="flex flex-col sm:flex-row items-center justify-between h-auto sm:h-20 py-3 sm:py-0 gap-4 sm:gap-0">
                                <div className="flex items-center gap-4">
                                    <div className="flex items-center justify-center w-12 h-12 bg-white rounded-lg shadow-md border-2 border-emerald-400">
                                        <span className="font-black text-2xl tracking-tighter text-slate-900">IL</span>
                                    </div>
                                    <div className="flex flex-col justify-center border-l border-white/20 pl-4">
                                        <span className="font-black text-lg tracking-wider leading-none text-white drop-shadow-md">Inteligência Logística</span>
                                        <span className="text-[10px] font-bold tracking-widest uppercase text-emerald-300 leading-tight mt-1.5 flex items-center gap-1.5 bg-black/20 w-fit px-2 py-0.5 rounded-md border border-white/10">
                                            <Icon name="shield-check" className="w-3 h-3" /> Planejamento e Controle
                                        </span>
                                    </div>
                                </div>
                                <div className="flex space-x-1 overflow-x-auto no-scrollbar py-1 w-full sm:w-auto">
                                    <button onClick={() => setActiveTab('operacional')} className={navTabClass('operacional')}><Icon name="calendar-days" className="w-3.5 h-3.5" /><span className="hidden sm:inline">Acomp. Operacional</span></button>
                                    <button onClick={() => setActiveTab('frota')} className={navTabClass('frota')}><Icon name="truck" className="w-3.5 h-3.5" /><span className="hidden sm:inline">Frota & Telemetria</span></button>
                                    <button onClick={() => setActiveTab('navios')} className={navTabClass('navios')}><Icon name="ship" className="w-3.5 h-3.5" /><span className="hidden sm:inline">Navios</span></button>
                                    <button onClick={() => setActiveTab('controle_operacoes')} className={navTabClass('controle_operacoes')}><Icon name="clipboard-edit" className="w-3.5 h-3.5" /><span className="hidden sm:inline">Reg. Operações</span></button>
                                    <button onClick={() => setActiveTab('visao_operacoes')} className={navTabClass('visao_operacoes')}><Icon name="list-checks" className="w-3.5 h-3.5" /><span className="hidden sm:inline">Visão Diária</span></button>
                                </div>
                            </div>
                        </div>
                    </nav>
                    
                    <main className="flex-1 p-4 sm:p-6 lg:p-8 max-w-[1600px] mx-auto w-full">
                        {activeTab === 'operacional' && <DashboardOperacional />}
                        {activeTab === 'frota' && <DashboardFrota />}
                        {activeTab === 'navios' && <KanbanNavios />}
                        {activeTab === 'controle_operacoes' && <DashboardControleOperacoes />}
                        {activeTab === 'visao_operacoes' && <DashboardVisaoOperacoes />}
                    </main>
                    
                    <footer className="text-center py-6 text-slate-400 text-xs font-bold uppercase tracking-widest bg-slate-200/50">
                        Modelo de Portfólio • Dados Fictícios Ilustrativos
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

        }

        function DarkKPICard({ title, value, color, pct }) {
          const colors = {
            cyan: 'bg-[#111827] border-[#1f2937] hover:border-cyan-500/50 shadow-[0_0_15px_rgba(6,182,212,0.1)]',
            purple: 'bg-[#111827] border-[#1f2937] hover:border-purple-500/50 shadow-[0_0_15px_rgba(168,85,247,0.1)]',
            blue: 'bg-[#111827] border-[#1f2937] hover:border-blue-500/50 shadow-[0_0_15px_rgba(59,130,246,0.1)]'
          };
          const lines = { cyan: 'bg-cyan-500', purple: 'bg-purple-500', blue: 'bg-blue-500' };
          
          return (
            <div className={`border rounded-xl p-4 md:p-5 relative overflow-hidden flex flex-col justify-between group transition-all ${colors[color]}`}>
              <div className={`absolute top-0 left-0 w-1 h-full ${lines[color]}`}></div>
              <div className="pl-2">
                <h3 className="text-[10px] md:text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-2">{title}</h3>
                {/* ALTERADO: Fonte fluida com proteção de quebra */}
                <div className="text-xl lg:text-2xl xl:text-3xl font-extrabold tracking-tight text-slate-100 whitespace-nowrap">{value}</div>
                {pct !== null && (
                  <div className="mt-3 md:mt-4">
                     <div className="flex justify-between text-[9px] md:text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-wider">
                       <span>Consumo Orçamento YTD</span>
                       <span className="text-slate-300">{pct.toFixed(1)}%</span>
                     </div>
                     <div className="h-1.5 w-full bg-[#1f2937] rounded-full overflow-hidden">
                       <div className={`h-full ${pct > 100 ? 'bg-red-500' : 'bg-cyan-400'} transition-all`} style={{ width: `${Math.min(pct, 100)}%` }}></div>
                     </div>
                  </div>
                )}
              </div>
            </div>
          );
        }

        function IndicadorCard({ title, data, formatData, numMonths, onClick, isFinanceiro = false, onDragStart, onDrop, onTouchStart, onTouchMove, onTouchEnd, onThreadOpen }) {
            const avgR25 = data.r25 / numMonths;
            const avgO26 = data.o26 / numMonths;
            const avgR26 = data.r26 / numMonths;
            
            const diffVal = avgR26 - avgO26;
            const diffPct = avgO26 > 0 ? (diffVal / avgO26) * 100 : 0;
            const isOver = diffVal > 0;
            const statusColor = isOver ? 'text-red-400 border-red-500/20 bg-red-500/10' : 'text-emerald-400 border-emerald-500/20 bg-emerald-500/10';

            const borderColorHover = isFinanceiro ? 'md:hover:border-cyan-500/50' : 'md:hover:border-purple-500/50';
            const borderAccent = 'border-[#1e293b]';
            const textAccent = isFinanceiro ? 'text-cyan-400' : 'text-purple-400';

            return (
                <div 
                  draggable="true"
                  onDragStart={onDragStart}
                  onDragOver={(e) => e.preventDefault()}
                  onDrop={onDrop}
                  onTouchStart={onTouchStart}
                  onTouchMove={onTouchMove}
                  onTouchEnd={onTouchEnd}
                  onClick={onClick} 
                  className={`min-w-[240px] w-[260px] shrink-0 bg-[#111827] border border-[#1f2937] rounded-xl p-4 cursor-pointer ${borderColorHover} transition-all group relative overflow-hidden`}
                >
                    <div className={`absolute top-0 left-0 w-1 h-full ${isFinanceiro ? 'bg-cyan-500' : 'bg-purple-500'}`}></div>
                    
                    <div className="absolute top-2 right-2 flex items-center gap-1 md:opacity-0 md:group-hover:opacity-100 transition-opacity">
                       <button onClick={onThreadOpen} className="p-1 md:p-1.5 bg-[#1e293b] rounded text-slate-400 hover:text-white"><MessageSquare size={12}/></button>
                       <div className="hidden md:block p-1.5 cursor-grab text-slate-500 hover:text-white"><GripHorizontal size={14}/></div>
                    </div>

                    <div className="pl-2">
                        <div className={`flex justify-between items-start mb-3 md:mb-4 border-b ${borderAccent} pb-2 md:pb-3 pr-10 md:group-hover:border-slate-600 transition-colors`}>
                            <h3 className="text-[10px] md:text-xs font-bold text-slate-400 uppercase tracking-widest leading-snug">MÉDIA YTD <br/><span className={`${textAccent} text-sm md:text-base font-extrabold`}>{title}</span></h3>
                            <span className={`text-[9px] md:text-[10px] font-bold px-2 py-0.5 rounded border ${statusColor}`}>
                                {isOver ? '+' : ''}{diffPct.toFixed(1)}%
                            </span>
                        </div>
                        <div className="space-y-2">
                            <div className="flex justify-between items-center text-[10px] md:text-xs">
                                <span className="text-slate-500 font-medium">Real '25</span>
                                <span className="text-slate-300">{formatData(avgR25)}</span>
                            </div>
                            <div className="flex justify-between items-center text-[10px] md:text-xs">
                                <span className={`${isFinanceiro ? 'text-blue-400' : 'text-purple-400/80'} font-medium`}>Orç '26</span>
                                <span className={`${isFinanceiro ? 'text-blue-400' : 'text-purple-400'} font-bold`}>{formatData(avgO26)}</span>
                            </div>
                            <div className={`flex justify-between items-center text-[10px] md:text-xs pt-1.5 md:pt-2 border-t ${borderAccent} md:group-hover:border-slate-600 transition-colors`}>
                                <span className={`${isFinanceiro ? 'text-cyan-400' : 'text-fuchsia-400'} font-medium`}>Real '26</span>
                                <span className={`${isFinanceiro ? 'text-cyan-400' : 'text-fuchsia-400'} font-extrabold text-xs md:text-sm`}>{formatData(avgR26)}</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function NeonLineChart({ data, formatData, activeMonths = [], isPurple = false }) {
          const [hoveredIndex, setHoveredIndex] = useState(null);
          if (!data || data.length === 0) return <div className="h-full flex items-center justify-center text-slate-500 font-medium">Sem dados no período</div>;
          
          const allVals = [];
          data.forEach(d => {
            if (d.real2025 > 0) allVals.push(d.real2025);
            if (d.orcado2026 > 0) allVals.push(d.orcado2026);
            if (d.real2026 > 0 && (activeMonths.length === 0 || activeMonths.includes(d.label))) allVals.push(d.real2026);
          });

          let minVal = 0; let maxVal = 100;
          if (allVals.length > 0) {
            minVal = Math.min(...allVals);
            maxVal = Math.max(...allVals);
            const diff = maxVal - minVal;
            if (diff === 0) {
              minVal = minVal * 0.8; maxVal = maxVal * 1.2;
            } else {
              minVal = Math.max(0, minVal - diff * 0.15); maxVal = maxVal + diff * 0.15; 
            }
          }
          if(minVal === maxVal) { maxVal = minVal + 10; }

          const width = 1000; const height = 300; const paddingX = 40; const paddingY = 30;
          const usableW = width - paddingX * 2; const usableH = height - paddingY * 2;
          
          const getX = (index) => {
            if (data.length === 1) return paddingX + usableW / 2;
            return paddingX + (index * (usableW / (data.length - 1)));
          };
          
          const range = maxVal - minVal || 1;
          const getY = (val) => height - paddingY - ((val - minVal) / range) * usableH;

          const pathR25 = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${getX(i)} ${getY(d.real2025)}`).join(' ');
          const pathO26 = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${getX(i)} ${getY(d.orcado2026)}`).join(' ');
          
          let cmdsR26 = [];
          let firstR26 = true;
          data.forEach((d, i) => {
            if (activeMonths.length === 0 || activeMonths.includes(d.label)) {
              cmdsR26.push(`${firstR26 ? 'M' : 'L'} ${getX(i)} ${getY(d.real2026)}`);
              firstR26 = false;
            }
          });
          const pathR26 = cmdsR26.join(' ');

          const accentColor = isPurple ? '#a855f7' : '#22d3ee'; 

          return (
            <div className="relative w-full h-full pt-2">
              <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-full overflow-visible" preserveAspectRatio="none">
                {[0, 1, 2, 3].map(i => {
                  const val = maxVal - (i * (range / 3));
                  return (
                    <g key={i}>
                      <line x1={paddingX} y1={paddingY + (i * (usableH / 3))} x2={width - paddingX} y2={paddingY + (i * (usableH / 3))} stroke="#1f2937" strokeWidth="1" strokeDasharray="4 4" vectorEffect="non-scaling-stroke" />
                      <text x={paddingX - 10} y={paddingY + (i * (usableH / 3)) + 4} textAnchor="end" className="fill-slate-500 text-[10px] font-medium">{val > 0 ? (val > 1000 ? (val/1000).toFixed(0)+'k' : val.toFixed(0)) : '0'}</text>
                    </g>
                  );
                })}
                <path d={pathR25} fill="none" stroke="#64748b" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" opacity="0.6" vectorEffect="non-scaling-stroke" />
                <path d={pathO26} fill="none" stroke="#3b82f6" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke" />
                {pathR26 && <path d={pathR26} fill="none" stroke={accentColor} strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke" />}

                {data.map((d, i) => {
                  const x = getX(i); const isHovered = hoveredIndex === i;
                  const showR26 = activeMonths.length === 0 || activeMonths.includes(d.label);
                  return (
                    <g key={i} onMouseEnter={() => setHoveredIndex(i)} onMouseLeave={() => setHoveredIndex(null)} className="cursor-crosshair">
                      <text x={x} y={height - 5} textAnchor="middle" className={`text-[10px] uppercase font-bold transition-colors ${isHovered ? (isPurple ? 'fill-purple-400' : 'fill-cyan-400') : 'fill-slate-500'}`}>{d.label.substring(0, 3)}</text>
                      {isHovered && <line x1={x} y1={paddingY} x2={x} y2={height - paddingY} stroke="#475569" strokeWidth="1" strokeDasharray="4 4" vectorEffect="non-scaling-stroke" />}
                      <circle cx={x} cy={getY(d.real2025)} r={isHovered ? 6 : 3} fill={isHovered ? "#f1f5f9" : "#64748b"} />
                      <circle cx={x} cy={getY(d.orcado2026)} r={isHovered ? 7 : 4} fill={isHovered ? "#eff6ff" : "#3b82f6"} />
                      {showR26 && <circle cx={x} cy={getY(d.real2026)} r={isHovered ? 7 : 4} fill={isHovered ? "#fff" : accentColor} />}
                      <rect x={x - (usableW / Math.max(1, data.length) / 2)} y={0} width={usableW / Math.max(1, data.length)} height={height} fill="transparent" />
                    </g>
                  );
                })}
              </svg>
              {hoveredIndex !== null && (
                <div className="absolute z-20 bg-[#0f172a]/95 backdrop-blur-md text-white p-3 md:p-4 rounded-xl shadow-[0_10px_30px_rgba(0,0,0,0.8)] border border-[#1e293b] pointer-events-none transform -translate-x-1/2 -translate-y-full mb-4 w-48 md:w-56"
                  style={{ left: data.length === 1 ? '50%' : `calc(${(hoveredIndex * (100 / (data.length - 1)))}% * ${usableW/width} + ${(paddingX/width)*100}%)`, top: '30%' }}>
                  <div className="font-bold text-[10px] md:text-xs mb-2 md:mb-3 text-center uppercase tracking-widest text-slate-300">{data[hoveredIndex].label}</div>
                  <div className="flex flex-col gap-1.5 md:gap-2">
                    <div className="flex items-center justify-between gap-4 text-[9px] md:text-xs">
                      <span className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-slate-500"></div>Real '25</span>
                      <span className="font-medium text-slate-300">{formatData(data[hoveredIndex].real2025)}</span>
                    </div>
                    <div className="flex items-center justify-between gap-4 text-[9px] md:text-xs">
                      <span className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-blue-500"></div>Orçado '26</span>
                      <span className="font-bold text-blue-400">{formatData(data[hoveredIndex].orcado2026)}</span>
                    </div>
                    <div className="flex items-center justify-between gap-4 text-[9px] md:text-xs pt-1.5 border-t border-[#1e293b]">
                      <span className="flex items-center gap-2"><div className={`w-2 h-2 rounded-full ${isPurple ? 'bg-purple-400' : 'bg-cyan-400'}`}></div>Real '26</span>
                      <span className={`font-extrabold ${isPurple ? 'text-purple-300' : 'text-cyan-300'}`}>
                        {(activeMonths.length === 0 || activeMonths.includes(data[hoveredIndex].label)) ? formatData(data[hoveredIndex].real2026) : '-'}
                      </span>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        function IndicadorDetailModal({ config, fullData, indicadoresData, onClose, formatNumber, formatCurrency, MONTHS_ORDER, activeMonths2026, onOpenThread }) {
          const { familia, indicador, isFinanceiro } = config;
          
          const dataToUse = useMemo(() => {
              if (isFinanceiro) return fullData.filter(d => d.familia === familia);
              return indicadoresData.filter(d => d.familia === familia && d.indicador === indicador);
          }, [fullData, indicadoresData, familia, indicador, isFinanceiro]);
          
          const formatData = isFinanceiro ? formatCurrency : formatNumber;
          const accentTextColor = isFinanceiro ? 'text-cyan-400' : 'text-purple-400';

          const chartStats = useMemo(() => {
              const stats = {};
              MONTHS_ORDER.forEach(m => { stats[m] = { label: m, real2025: 0, orcado2026: 0, real2026: 0 }; });
              dataToUse.forEach(item => {
                  const m = item.mes.toUpperCase();
                  if (item.ano === 2025 && item.tipo === 'REALIZADO') stats[m].real2025 += item.valor;
                  else if (item.ano === 2026 && item.tipo === 'ORÇADO') stats[m].orcado2026 += item.valor;
                  else if (item.ano === 2026 && item.tipo === 'REALIZADO') stats[m].real2026 += item.valor;
              });
              return Object.values(stats);
          }, [dataToUse]);

          const tableStats = useMemo(() => {
              const stats = {};
              dataToUse.forEach(item => {
                  const mod = item.modelo || 'Sem Modelo';
                  if (!stats[mod]) {
                      stats[mod] = { label: mod, total: { real2025: 0, orcado2026: 0, real2026: 0 }, meses: {} };
                      MONTHS_ORDER.forEach(m => stats[mod].meses[m] = { real2025: 0, orcado2026: 0, real2026: 0 });
                  }
                  
                  const val = item.valor;
                  const m = item.mes.toUpperCase();
                  const isActive = activeMonths2026.length === 0 || activeMonths2026.includes(m);
                  
                  if (item.ano === 2025 && item.tipo === 'REALIZADO') { 
                    if (isActive) stats[mod].total.real2025 += val; 
                    stats[mod].meses[m].real2025 += val; 
                  } 
                  else if (item.ano === 2026 && item.tipo === 'ORÇADO') { 
                    if (isActive) stats[mod].total.orcado2026 += val; 
                    stats[mod].meses[m].orcado2026 += val; 
                  } 
                  else if (item.ano === 2026 && item.tipo === 'REALIZADO') { 
                    stats[mod].total.real2026 += val; 
                    stats[mod].meses[m].real2026 += val; 
                  }
              });
              return Object.values(stats).sort((a,b) => b.total.orcado2026 - a.total.orcado2026);
          }, [dataToUse, activeMonths2026]);

          const [expandedModels, setExpandedModels] = useState({});
          const toggleModel = (id) => setExpandedModels(prev => ({ ...prev, [id]: !prev[id] }));

          return (
            <div className="fixed inset-0 z-[70] flex items-end md:items-center justify-center bg-black/80 md:p-4 backdrop-blur-sm">
              <div className="bg-[#0b1121] rounded-t-2xl md:rounded-2xl shadow-[0_-10px_40px_rgba(0,0,0,1)] border border-[#1f2937] w-full md:max-w-5xl max-h-[90vh] md:max-h-[95vh] flex flex-col overflow-hidden animate-in slide-in-from-bottom-8 md:zoom-in-95 duration-300">
                
                <div className="bg-[#0f172a] p-4 md:p-6 flex justify-between items-start sticky top-0 z-10 text-white border-b border-[#1f2937]">
                  <div>
                    <span className={`text-[10px] font-bold ${accentTextColor} uppercase tracking-widest mb-1 flex items-center gap-2`}>
                      <FamilyIcon family={familia} size={14}/> Família: {familia}
                    </span>
                    <h2 className="text-base md:text-xl font-bold tracking-wider text-slate-100 flex flex-wrap items-center gap-2 md:gap-4">
                      {indicador} (YTD)
                      <button onClick={() => onOpenThread(`MODAL-${familia}-${indicador}`)} className="text-[9px] md:text-[10px] uppercase bg-[#111827] border border-[#1f2937] hover:border-slate-500 text-slate-400 hover:text-white px-2 py-1 rounded flex items-center gap-1.5 transition-all">
                        <MessageSquare size={12}/> Discutir
                      </button>
                    </h2>
                  </div>
                  <button onClick={onClose} className="p-1.5 md:p-2 bg-[#1e293b] rounded-lg text-slate-400 hover:text-red-400 transition-all">
                    <X size={20} />
                  </button>
                </div>

                <div className="flex-1 overflow-y-auto p-4 md:p-6 bg-[#040814] custom-scrollbar hide-scroll-mobile">
                  
                  <div className="bg-[#111827] border border-[#1f2937] rounded-xl p-4 md:p-6 mb-6">
                    <h3 className="text-xs font-bold text-white uppercase tracking-widest mb-2">Evolução Mensal</h3>
                    <div className="h-[200px] md:h-[250px] w-full">
                      <NeonLineChart data={chartStats} formatData={formatData} activeMonths={activeMonths2026} isPurple={!isFinanceiro} />
                    </div>
                  </div>

                  <div className="border border-[#1f2937] rounded-xl overflow-x-auto bg-[#0b1121] custom-scrollbar">
                    <table className="w-full text-left border-collapse min-w-[700px]">
                      <thead>
                        <tr className="bg-[#0f172a] text-slate-400 text-[9px] md:text-[10px] font-extrabold uppercase tracking-widest border-b border-[#1f2937]">
                          <th className="p-3 md:p-5 w-[30%] pl-4 md:pl-6 whitespace-nowrap">Modelo</th>
                          <th className="p-3 md:p-5 text-right w-[15%] whitespace-nowrap">Real '25</th>
                          <th className="p-3 md:p-5 text-right w-[15%] text-blue-400 whitespace-nowrap">Orçado '26</th>
                          <th className={`p-3 md:p-5 text-right w-[15%] ${isFinanceiro ? 'text-cyan-400' : 'text-purple-400'} whitespace-nowrap`}>Real '26</th>
                          <th className="p-3 md:p-5 text-center w-[15%] pr-4 md:pr-6 whitespace-nowrap">Status YTD</th>
                        </tr>
                      </thead>
                      <tbody className="text-xs md:text-sm">
                        {tableStats.map((mod, idx) => {
                          const isModExp = expandedModels[mod.label];
                          const diffValue = mod.total.real2026 - mod.total.orcado2026;
                          const diffPercent = mod.total.orcado2026 > 0 ? (diffValue / mod.total.orcado2026) * 100 : 0;
                          const isOver = diffValue > 0;

                          return (
                            <Fragment key={idx}>
                              <tr onClick={() => toggleModel(mod.label)} className={`border-b border-[#1f2937] transition-all duration-200 cursor-pointer ${isModExp ? 'bg-[#162032]' : 'bg-[#111827] hover:bg-[#162032]'}`}>
                                <td className={`p-3 md:p-4 pl-4 md:pl-6 font-bold text-slate-300 flex items-center gap-2 md:gap-3 text-xs md:text-sm ${isModExp ? accentTextColor : ''}`}>
                                  <span className={`bg-[#0f172a] border border-[#1f2937] shadow-sm rounded p-0.5 ${accentTextColor}`}>{isModExp ? <MinusSquare size={14}/> : <PlusSquare size={14}/>}</span>
                                  <span className="truncate max-w-[120px] md:max-w-[200px]">{mod.label}</span>
                                </td>
                                <td className="p-3 md:p-4 text-right text-slate-400">{formatData(mod.total.real2025)}</td>
                                <td className="p-3 md:p-4 text-right text-blue-400/80 font-bold">{formatData(mod.total.orcado2026)}</td>
                                <td className={`p-3 md:p-4 text-right font-extrabold ${isFinanceiro ? 'text-cyan-400' : 'text-purple-400'}`}>{formatData(mod.total.real2026)}</td>
                                <td className="p-3 md:p-4 text-center text-[10px] md:text-[11px] font-bold pr-4 md:pr-6">
                                  <span className={`px-2 py-1 rounded border ${isOver ? 'text-red-400 bg-red-500/10 border-red-500/20' : 'text-emerald-400 bg-emerald-500/10 border-emerald-500/20'}`}>{isOver ? '+' : ''}{diffPercent.toFixed(1)}%</span>
                                </td>
                              </tr>
                              
                              {isModExp && (
                                <tr className="bg-[#070b14] border-b border-[#1f2937]">
                                  <td colSpan="5" className="py-4 md:py-6 pl-4 md:pl-[4.5rem] pr-4 md:pr-6">
                                    <div className="flex flex-nowrap overflow-x-auto gap-3 md:gap-4 w-full custom-scrollbar pb-2 hide-scroll-mobile">
                                      {MONTHS_ORDER.map(m => {
                                        const mData = mod.meses[m];
                                        if(mData.real2025 === 0 && mData.orcado2026 === 0 && mData.real2026 === 0) return null;
                                        
                                        const mDiffVal = mData.real2026 - mData.orcado2026;
                                        const mDiffPct = mData.orcado2026 > 0 ? (mDiffVal / mData.orcado2026) * 100 : 0;
                                        const mIsOverBudget = mDiffVal > 0;
                                        const mStatusColor = mIsOverBudget ? 'text-red-400' : 'text-emerald-400';

                                        return (
                                          <div key={m} className={`min-w-[200px] md:min-w-[240px] shrink-0 bg-[#0f172a] border border-[#1e293b] rounded-xl p-3 md:p-4 flex flex-col gap-1.5 md:gap-2 shadow-lg transition-all`}>
                                            <div className="flex items-center justify-between border-b border-[#1e293b] pb-1.5 md:pb-2 mb-1">
                                              <span className="text-xs md:text-sm font-extrabold text-slate-200 uppercase tracking-wider">{m.substring(0,3)}</span>
                                              <span className={`text-[9px] md:text-[11px] px-2 py-0.5 rounded-md bg-[#070b14] border border-transparent font-bold ${mStatusColor}`}>
                                                {mIsOverBudget ? '+' : ''}{mDiffPct.toFixed(1)}%
                                              </span>
                                            </div>
                                            <div className="flex justify-between items-center text-[10px] md:text-xs">
                                              <span className="text-slate-500 font-medium">Real '25</span>
                                              <span className="text-slate-300 font-semibold">{formatData(mData.real2025)}</span>
                                            </div>
                                            <div className="flex justify-between items-center text-[10px] md:text-xs">
                                              <span className="text-blue-500/80 font-medium">Orç '26</span>
                                              <span className="text-blue-400 font-bold">{formatData(mData.orcado2026)}</span>
                                            </div>
                                            <div className={`flex justify-between items-center text-[10px] md:text-xs pt-1 mt-0.5 border-t border-[#1e293b]`}>
                                              <span className={`${isFinanceiro ? 'text-cyan-400/80' : 'text-purple-400/80'} font-medium`}>Real '26</span>
                                              <span className={`font-extrabold text-xs md:text-sm ${isFinanceiro ? 'text-cyan-400' : 'text-purple-400'}`}>{formatData(mData.real2026)}</span>
                                            </div>
                                          </div>
                                        );
                                      })}
                                    </div>
                                  </td>
                                </tr>
                              )}
                            </Fragment>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        function AccountDetailModal({ conta, fullData, indicadoresData, onClose, formatCurrency, formatNumber, MONTHS_ORDER, activeMonths2026, onOpenThread }) {
          const newStatsObj = () => ({ real2025: 0, orcado2026: 0, real2026: 0 });
          const newMesesObj = () => { const m = {}; MONTHS_ORDER.forEach(mes => m[mes] = newStatsObj()); return m; };

          const familyHierarchy = useMemo(() => {
            const stats = {};
            const accountData = fullData.filter(d => d.contaContabil === conta);

            accountData.forEach(item => {
              const fam = item.familia || 'Sem Família';
              const mod = item.modelo || 'Sem Modelo';
              if (!stats[fam]) stats[fam] = { label: fam, financeiroTotal: newStatsObj(), modelos: {} };
              if (!stats[fam].modelos[mod]) {
                stats[fam].modelos[mod] = { label: mod, financeiro: { total: newStatsObj(), meses: newMesesObj() }, indicadores: {} };
              }

              const val = item.valor;
              const m = item.mes.toUpperCase();
              const isActive = activeMonths2026.length === 0 || activeMonths2026.includes(m);
              const tTot = stats[fam].modelos[mod].financeiro.total;
              const tMes = stats[fam].modelos[mod].financeiro.meses[m];

              if (tMes) {
                if (item.ano === 2025 && item.tipo === 'REALIZADO') { 
                  if (isActive) tTot.real2025 += val; 
                  tMes.real2025 += val; 
                } 
                else if (item.ano === 2026 && item.tipo === 'ORÇADO') { 
                  if (isActive) tTot.orcado2026 += val; 
                  tMes.orcado2026 += val; 
                } 
                else if (item.ano === 2026 && item.tipo === 'REALIZADO') { 
                  tTot.real2026 += val; 
                  tMes.real2026 += val; 
                }
              }
            });

            Object.values(stats).forEach(fam => {
              Object.values(fam.modelos).forEach(mod => {
                ['real2025', 'orcado2026', 'real2026'].forEach(k => {
                  fam.financeiroTotal[k] += mod.financeiro.total[k];
                });
              });
              fam.modelosList = Object.values(fam.modelos).sort((a,b) => b.financeiro.total.orcado2026 - a.financeiro.total.orcado2026);
            });

            return Object.values(stats).sort((a,b) => b.financeiroTotal.orcado2026 - a.financeiroTotal.orcado2026);
          }, [fullData, conta, indicadoresData, activeMonths2026]);

          const [expandedNodes, setExpandedNodes] = useState({});
          const toggleNode = (nodeId) => setExpandedNodes(prev => ({ ...prev, [nodeId]: !prev[nodeId] }));

          const renderMetricRow = (title, dataObj, nodeId, formatter, isBadIfPositive = true, colorClass = "text-cyan-400") => {
            const isExp = expandedNodes[nodeId];
            const diffVal = dataObj.total.real2026 - dataObj.total.orcado2026;
            const diffPct = dataObj.total.orcado2026 > 0 ? (diffVal / dataObj.total.orcado2026) * 100 : 0;
            const isOver = diffVal > 0;
            
            const statusColor = (isOver && isBadIfPositive) || (!isOver && !isBadIfPositive) ? 'text-red-400 bg-red-500/10 border-red-500/20' : 'text-emerald-400 bg-emerald-500/10 border-emerald-500/20';

            let hasAnyData = false;
            MONTHS_ORDER.forEach(m => {
              if (Math.abs(dataObj.meses[m].real2025) >= 0.001 || Math.abs(dataObj.meses[m].orcado2026) >= 0.001 || Math.abs(dataObj.meses[m].real2026) >= 0.001) {
                hasAnyData = true;
              }
            });
            if (!hasAnyData) return null;

            return (
              <Fragment key={nodeId}>
                <tr onClick={() => toggleNode(nodeId)} className={`border-b border-[#1f2937] cursor-pointer group transition-all ${isExp ? 'bg-[#162032]' : 'bg-[#111827] hover:bg-[#162032]'}`}>
                  <td className="p-3 md:p-4 pl-10 md:pl-16 font-semibold text-slate-300 flex items-center gap-2 md:gap-3 text-[10px] md:text-xs group-hover:text-cyan-400">
                    <span className="text-cyan-500 bg-[#0f172a] rounded border border-[#1f2937] p-0.5 shadow-sm">{isExp ? <MinusSquare size={12}/> : <PlusSquare size={12}/>}</span>
                    <span className="truncate max-w-[100px] md:max-w-auto">{title}</span>
                  </td>
                  <td className="p-3 md:p-4 text-right text-slate-500 text-[10px] md:text-xs">{formatter(dataObj.total.real2025)}</td>
                  <td className="p-3 md:p-4 text-right text-blue-400/80 font-bold text-[10px] md:text-xs">{formatter(dataObj.total.orcado2026)}</td>
                  <td className={`p-3 md:p-4 text-right font-extrabold text-[10px] md:text-xs ${colorClass}`}>{formatter(dataObj.total.real2026)}</td>
                  <td className="p-3 md:p-4 text-center text-[9px] md:text-[10px] font-bold pr-4 md:pr-6 flex items-center justify-end gap-1 md:gap-2">
                    <span className={`px-1 md:px-2 py-0.5 md:py-1 rounded border ${statusColor}`}>{isOver ? '+' : ''}{diffPct.toFixed(1)}%</span>
                    <button onClick={(e) => { e.stopPropagation(); onOpenThread(`METRICA-${nodeId}`); }} className="p-1 hover:text-white text-slate-500"><MessageSquare size={14}/></button>
                  </td>
                </tr>
                
                {isExp && (
                  <tr className="bg-[#070b14] border-b border-[#1f2937] shadow-inner">
                    <td colSpan="5" className="py-4 md:py-6 pl-4 md:pl-16 pr-4 md:pr-6">
                      <div className="flex flex-nowrap overflow-x-auto gap-3 md:gap-4 w-full custom-scrollbar pb-2 hide-scroll-mobile">
                        {MONTHS_ORDER.map(m => {
                          const mData = dataObj.meses[m];
                          if(mData.real2025 === 0 && mData.orcado2026 === 0 && mData.real2026 === 0) return null;
                          
                          const mDiffVal = mData.real2026 - mData.orcado2026;
                          const mDiffPct = mData.orcado2026 > 0 ? (mDiffVal / mData.orcado2026) * 100 : 0;
                          const mIsOverBudget = mDiffVal > 0;
                          const mStatusColor = (mIsOverBudget && isBadIfPositive) || (!mIsOverBudget && !isBadIfPositive) ? 'text-red-400' : 'text-emerald-400';

                          return (
                            <div key={`${nodeId}-${m}`} className="min-w-[200px] md:min-w-[240px] shrink-0 bg-[#0f172a] border border-[#1e293b] rounded-xl p-3 md:p-4 flex flex-col gap-1.5 md:gap-2 shadow-lg transition-all group">
                              <div className="flex items-center justify-between border-b border-[#1e293b] pb-1.5 md:pb-2 mb-1">
                                <span className="text-xs md:text-sm font-extrabold text-slate-200 uppercase tracking-wider">{m.substring(0,3)}</span>
                                <span className={`text-[9px] md:text-[11px] px-2 py-0.5 rounded-md bg-[#070b14] font-bold border border-transparent ${mStatusColor}`}>
                                  {mIsOverBudget ? '+' : ''}{mDiffPct.toFixed(1)}%
                                </span>
                              </div>
                              <div className="flex justify-between items-center text-[10px] md:text-xs">
                                <span className="text-slate-500 font-medium">Real '25</span>
                                <span className="text-slate-300 font-semibold">{formatter(mData.real2025)}</span>
                              </div>
                              <div className="flex justify-between items-center text-[10px] md:text-xs">
                                <span className="text-blue-500/80 font-medium">Orç '26</span>
                                <span className="text-blue-400 font-bold">{formatter(mData.orcado2026)}</span>
                              </div>
                              <div className="flex justify-between items-center text-[10px] md:text-xs pt-1 mt-0.5 border-t border-[#1e293b]">
                                <span className="text-cyan-500/80 font-medium">Real '26</span>
                                <span className={`font-extrabold text-xs md:text-sm ${colorClass.split(' ')[0]}`}>{formatter(mData.real2026)}</span>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </td>
                  </tr>
                )}
              </Fragment>
            );
          };

          return (
            <div className="fixed inset-0 z-[70] flex items-end md:items-center justify-center bg-black/80 md:p-4 backdrop-blur-sm">
              <div className="bg-[#0b1121] rounded-t-2xl md:rounded-2xl shadow-[0_-10px_40px_rgba(0,0,0,1)] md:shadow-[0_0_40px_rgba(0,0,0,1)] border border-[#1f2937] w-full md:max-w-5xl max-h-[90vh] md:max-h-[95vh] flex flex-col overflow-hidden animate-in slide-in-from-bottom-8 md:zoom-in-95 duration-300">
                
                <div className="bg-[#0f172a] p-4 md:p-6 flex justify-between items-start sticky top-0 z-10 text-white border-b border-[#1f2937]">
                  <div>
                    <span className="text-[9px] md:text-[10px] font-bold text-cyan-400 uppercase tracking-widest mb-1 flex items-center gap-2">
                      <Target size={14}/> Análise Financeira
                    </span>
                    <h2 className="text-base md:text-xl font-bold tracking-wider text-slate-100 flex flex-wrap items-center gap-2 md:gap-4">
                      {conta}
                      <button onClick={() => onOpenThread(`CONTA-${conta}`)} className="text-[9px] md:text-[10px] uppercase bg-[#111827] border border-[#1f2937] text-cyan-400/80 hover:text-cyan-400 px-2 py-1 rounded flex items-center gap-1.5 transition-all">
                        <MessageSquare size={12}/> Comentar
                      </button>
                    </h2>
                  </div>
                  <button onClick={onClose} className="p-1.5 md:p-2 bg-[#1e293b] border border-[#334155] rounded-lg text-slate-400 hover:bg-red-500 hover:text-white transition-all shadow-sm">
                    <X size={20} />
                  </button>
                </div>

                <div className="flex-1 overflow-y-auto p-4 md:p-6 bg-[#040814] custom-scrollbar hide-scroll-mobile">
                  <div className="border border-[#1f2937] rounded-xl overflow-x-auto bg-[#0b1121] shadow-sm custom-scrollbar">
                    <table className="w-full text-left border-collapse min-w-[700px]">
                      <thead>
                        <tr className="bg-[#0f172a] text-slate-400 text-[9px] md:text-[10px] font-extrabold uppercase tracking-widest border-b border-[#1f2937]">
                          <th className="p-3 md:p-5 w-[30%] pl-4 md:pl-6 whitespace-nowrap">Frota</th>
                          <th className="p-3 md:p-5 text-right w-[15%] whitespace-nowrap">Real '25 (YTD)</th>
                          <th className="p-3 md:p-5 text-right w-[15%] text-blue-400 whitespace-nowrap">Orç '26 (YTD)</th>
                          <th className="p-3 md:p-5 text-right w-[15%] text-cyan-400 whitespace-nowrap">Real '26 (YTD)</th>
                          <th className="p-3 md:p-5 text-center w-[15%] pr-4 md:pr-6 whitespace-nowrap">Var %</th>
                        </tr>
                      </thead>
                      <tbody className="text-xs md:text-sm">
                        {familyHierarchy.length === 0 && (
                           <tr><td colSpan="5" className="p-8 text-center text-slate-500 font-medium">Sem dados vinculados a esta conta.</td></tr>
                        )}
                        
                        {familyHierarchy.map((fam, fIdx) => {
                          const famId = `fam-${fam.label}`;
                          const isFamExp = expandedNodes[famId];
                          const fDiff = fam.financeiroTotal.real2026 - fam.financeiroTotal.orcado2026;
                          
                          return (
                            <Fragment key={famId}>
                              <tr onClick={() => toggleNode(famId)} className={`border-b border-[#1f2937] transition-all duration-200 cursor-pointer ${isFamExp ? 'bg-[#1e293b]' : 'bg-[#111827] hover:bg-[#1e293b]'}`}>
                                <td className="p-3 md:p-4 pl-4 md:pl-6 font-bold text-white flex items-center gap-2 md:gap-3">
                                  <span className="text-cyan-400 bg-[#0f172a] p-1 rounded shadow-sm border border-[#334155]">{isFamExp ? <ChevronDown size={14}/> : <ChevronRight size={14}/>}</span>
                                  <FamilyIcon family={fam.label} size={16} />
                                  <span>{fam.label}</span>
                                </td>
                                <td className="p-3 md:p-4 text-right text-slate-400 font-medium">{formatCurrency(fam.financeiroTotal.real2025)}</td>
                                <td className="p-3 md:p-4 text-right font-bold text-blue-400">{formatCurrency(fam.financeiroTotal.orcado2026)}</td>
                                <td className="p-3 md:p-4 text-right font-extrabold text-cyan-400">{formatCurrency(fam.financeiroTotal.real2026)}</td>
                                <td className="p-3 md:p-4 text-center text-[10px] md:text-[11px] font-bold pr-4 md:pr-6">
                                  <span className={`px-2 py-1 rounded border ${fDiff > 0 ? 'bg-red-500/10 text-red-400 border-red-500/20' : 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20'}`}>{fDiff > 0 ? '+' : ''}{fam.financeiroTotal.orcado2026 > 0 ? ((fDiff/fam.financeiroTotal.orcado2026)*100).toFixed(1) : 0}%</span>
                                </td>
                              </tr>

                              {isFamExp && fam.modelosList.map((mod, mIdx) => {
                                const modId = `${famId}-mod-${mod.label}`; const isModExp = expandedNodes[modId];
                                return (
                                  <Fragment key={modId}>
                                    <tr onClick={() => toggleNode(modId)} className={`border-b border-[#1f2937] transition-all duration-200 cursor-pointer ${isModExp ? 'bg-[#162032]' : 'bg-[#0f172a] hover:bg-[#162032]'}`}>
                                      <td className="p-3 md:p-3 pl-8 md:pl-12 font-bold text-slate-300 flex items-center gap-2 md:gap-3 text-xs md:text-sm group-hover:text-cyan-400">
                                        <span className="text-cyan-500 bg-[#1e293b] rounded p-0.5 border border-[#334155] shadow-sm">{isModExp ? <MinusSquare size={14}/> : <PlusSquare size={14}/>}</span> 
                                        <span className="truncate max-w-[120px] md:max-w-[200px]">{mod.label}</span>
                                      </td>
                                      <td className="p-3 md:p-3 text-right text-slate-500 text-[10px] md:text-xs font-medium">{formatCurrency(mod.financeiro.total.real2025)}</td>
                                      <td className="p-3 md:p-3 text-right font-bold text-blue-500/80 text-[10px] md:text-xs">{formatCurrency(mod.financeiro.total.orcado2026)}</td>
                                      <td className="p-3 md:p-3 text-right font-bold text-cyan-500/80 text-[10px] md:text-xs">{formatCurrency(mod.financeiro.total.real2026)}</td>
                                      <td className="p-3 md:p-3 text-center pr-4 md:pr-6 text-[9px] md:text-[10px] font-bold text-slate-500">-</td>
                                    </tr>

                                    {isModExp && (
                                      <Fragment>
                                        {renderMetricRow("💰 Custo Acumulado", mod.financeiro, `${modId}-fin`, formatCurrency, true, "text-cyan-400")}
                                      </Fragment>
                                    )}
                                  </Fragment>
                                );
                              })}
                            </Fragment>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
